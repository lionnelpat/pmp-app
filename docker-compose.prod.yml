# ─────────────────────────────────────────────────────────────────────────────
#  Stack PRODUCTION pour Dokploy (Traefik + HTTPS gérés par Dokploy)
#
#  ⚠️  Type « Docker Compose » dans Dokploy : le routage Traefik se fait par les
#      LABELS ci-dessous, PAS par l'onglet « Domains » de l'UI (réservé au type
#      « Application »). Ne configure donc AUCUN domaine dans l'UI pour éviter
#      les conflits — tout est ici.
#
#  Déploiement :
#    1. Dokploy → Create Compose → dépôt Git → Compose Path: docker-compose.prod.yml
#    2. Onglet Environment : coller .env.example (secrets + APP_DOMAIN/ADMINER_DOMAIN)
#    3. DNS : A record  pmp.model-technologie.com  →  IP du VPS  (idem adminer)
#    4. Deploy
#
#  Postgres et Backend restent internes. Le frontend (nginx) sert React et
#  proxifie /api vers le backend. Adminer est exposé sur son propre sous-domaine.
# ─────────────────────────────────────────────────────────────────────────────
services:

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-pmp_quiz}
      POSTGRES_USER:     ${POSTGRES_USER:-pmp_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD requis}
    volumes:
      - pmp_quiz_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pmp_user} -d ${POSTGRES_DB:-pmp_quiz}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    # Interne : joignable par le frontend (nginx) via http://backend:3001
    environment:
      NODE_ENV:       production
      PORT:           3001
      DATABASE_URL:   postgresql://${POSTGRES_USER:-pmp_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-pmp_quiz}
      JWT_SECRET:     ${JWT_SECRET:?JWT_SECRET requis}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?ADMIN_PASSWORD requis}
      ADMIN_EMAIL:    ${ADMIN_EMAIL:-admin@pmp.local}
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      - backend
    networks:
      - default          # frontend ↔ backend ↔ postgres (interne)
      - dokploy-network   # ingress Traefik (public)
    labels:
      - traefik.enable=true
      - traefik.docker.network=dokploy-network
      # Routeur HTTPS
      - traefik.http.routers.pmp-frontend.rule=Host(`${APP_DOMAIN:-pmp.model-technologie.com}`)
      - traefik.http.routers.pmp-frontend.entrypoints=websecure
      - traefik.http.routers.pmp-frontend.tls.certresolver=letsencrypt
      - traefik.http.services.pmp-frontend.loadbalancer.server.port=80
      # Routeur HTTP → redirection vers HTTPS
      - traefik.http.routers.pmp-frontend-web.rule=Host(`${APP_DOMAIN:-pmp.model-technologie.com}`)
      - traefik.http.routers.pmp-frontend-web.entrypoints=web
      - traefik.http.routers.pmp-frontend-web.middlewares=pmp-redirect-https
      - traefik.http.middlewares.pmp-redirect-https.redirectscheme.scheme=https

  adminer:
    image: adminer:latest
    restart: unless-stopped
    environment:
      ADMINER_DEFAULT_SERVER: postgres
      ADMINER_DESIGN: pepa-linha
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - default          # adminer ↔ postgres
      - dokploy-network   # ingress Traefik (public)
    labels:
      - traefik.enable=true
      - traefik.docker.network=dokploy-network
      - traefik.http.routers.pmp-adminer.rule=Host(`${ADMINER_DOMAIN:-pmp-adminer.model-technologie.com}`)
      - traefik.http.routers.pmp-adminer.entrypoints=websecure
      - traefik.http.routers.pmp-adminer.tls.certresolver=letsencrypt
      - traefik.http.services.pmp-adminer.loadbalancer.server.port=8080
      - traefik.http.routers.pmp-adminer-web.rule=Host(`${ADMINER_DOMAIN:-pmp-adminer.model-technologie.com}`)
      - traefik.http.routers.pmp-adminer-web.entrypoints=web
      - traefik.http.routers.pmp-adminer-web.middlewares=pmp-redirect-https

networks:
  # Réseau créé par Dokploy ; Traefik y est rattaché.
  dokploy-network:
    external: true

volumes:
  pmp_quiz_postgres_data:

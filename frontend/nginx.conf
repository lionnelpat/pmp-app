server {
    listen 80;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    # Uploads JSON d'examens (le backend accepte jusqu'à 20 Mo)
    client_max_body_size 25m;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json;

    # Proxy des appels API vers le conteneur backend (réseau interne Docker).
    # IMPORTANT : on résout "backend" DYNAMIQUEMENT via le DNS Docker (127.0.0.11)
    # à chaque requête. Sinon nginx fige l'IP au démarrage et tombe en
    # "connection refused" dès que le conteneur backend est recréé (redéploiement
    # Dokploy → nouvelle IP).
    location /api/ {
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $pmp_backend backend;
        proxy_pass         http://$pmp_backend:3001$request_uri;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Cache long pour les assets fingerprintés de CRA
    location /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA : toute autre route retombe sur index.html (React Router côté client)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
